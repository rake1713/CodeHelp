<div class="auth-page">
  <div class="auth-card">
    <div class="brand-logo">code<span class="logo-light">Help</span></div>
    
    <h2 class="auth-title">Registration</h2>
    <p class="auth-subtitle">Join the coding community today.</p>

    <div class="form-group">
      <label>Username</label>
      <input [(ngModel)]="username" type="text" class="linear-input" placeholder="Choose a username" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input [(ngModel)]="email" type="email" class="linear-input" placeholder="your@email.com" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input [(ngModel)]="password" type="password" class="linear-input" placeholder="Create a strong password" />
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input [(ngModel)]="confirmPassword" type="password" class="linear-input" placeholder="Repeat your password" />
    </div>

    <button class="primary-btn" (click)="register()" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Sign Up' }}
    </button>

    @if (error) {
      <div class="status-msg error">{{ error }}</div>
    }

    <div class="auth-footer">
      Have an account? <a routerLink="/login">Login</a>
    </div>
  </div>
</div>
