<div class="auth-page">
  <div class="auth-card">
    <div class="brand-logo">code<span class="logo-light">Help</span></div>
    
    <h2 class="auth-title">Login</h2>
    <p class="auth-subtitle">Login to your account.</p>

    <div class="form-group">
      <label>Username</label>
      <input [(ngModel)]="username" type="text" class="linear-input" placeholder="Enter your username" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input [(ngModel)]="password" type="password" class="linear-input" placeholder="••••••••" />
    </div>

    <button class="primary-btn" (click)="onLogin()">Login</button>

    @if (loading) {
      <div class="status-msg">Loading...</div>
    }

    @if (errorMessage) {
      <div class="status-msg error">{{ errorMessage }}</div>
    }

    <div class="auth-footer">
      No account? <a routerLink="/register">Registration</a>
    </div>
  </div>
</div>
