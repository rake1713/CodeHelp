<div class="auth-page">
  <div class="auth-card">
    <h2 class="auth-title">Войти</h2>
    <p class="auth-subtitle">Войдите в свой аккаунт</p>

    <div class="form-group">
      <label>Логин</label>
      <input [(ngModel)]="username" type="text" placeholder="username" />
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input [(ngModel)]="password" type="password" placeholder="••••••••" />
    </div>

    <button class="login-btn" (click)="onLogin()">Войти</button>

    @if (loading) {
      <p class="info-text">Загрузка...</p>
    }

    @if (errorMessage) {
      <p class="error-text">{{ errorMessage }}</p>
    }

    <div class="register-link">
      Нет аккаунта?
      <a routerLink="/register">Зарегистрироваться</a>
    </div>
  </div>
</div>
